    <text x="785" y="278" font-size="13" font-weight="700" text-anchor="middle">check 실측 → 수정</text>

    <path d="M 870 240 H 902" fill="none" stroke="#0A0A0A" stroke-width="4"/>
    <polygon points="914,240 902,234 902,246"/>

