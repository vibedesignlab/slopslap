    <text x="105" y="290" font-size="13" font-weight="700" text-anchor="middle">상수화·BOLD</text>
    <text x="105" y="306" font-size="13" font-weight="700" text-anchor="middle">판정</text>

    <text x="320" y="84" font-size="14" font-weight="800" text-anchor="middle">5 AGENTS IN PARALLEL</text>

