    <text x="999" y="244" font-size="20" font-weight="900" text-anchor="middle">RE-CHECK</text>
    <text x="999" y="278" font-size="13" font-weight="700" text-anchor="middle">같은 check 재실측</text>

    <path d="M 999 300 V 350 H 785 V 312" fill="none" stroke="#FF3B30" stroke-width="4" stroke-linejoin="miter"/>
    <polygon points="785,300 779,312 791,312" fill="#FF3B30"/>
    <text x="892" y="374" font-size="13" font-weight="800" text-anchor="middle" fill="#FF3B30">FAIL → 재집행</text>

    <path d="M 1084 240 H 1112" fill="none" stroke="#0A0A0A" stroke-width="4"/>
    <polygon points="1124,240 1112,234 1112,246"/>

    <rect x="1130" y="186" width="150" height="120" rx="0" fill="#0A0A0A"/>
    <rect x="1124" y="180" width="150" height="120" rx="0" fill="#FFD400" stroke="#0A0A0A" stroke-width="4"/>
