<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" fill="#FAF7F0"/>
  <g font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" fill="#0A0A0A">
    <text x="30" y="42" font-size="24" font-weight="900" letter-spacing="3">THE PIPELINE — INSPECT IN PARALLEL, SLAP IN ORDER</text>

