    <text x="1199" y="244" font-size="20" font-weight="900" text-anchor="middle">RENDER ×1</text>
    <text x="1199" y="273" font-size="13" font-weight="700" text-anchor="middle">before/after</text>
    <text x="1199" y="290" font-size="13" font-weight="700" text-anchor="middle">캡처</text>

    <rect x="454" y="462" width="680" height="54" rx="0" fill="#0A0A0A"/>
    <rect x="450" y="458" width="680" height="54" rx="0" fill="#FFD400" stroke="#0A0A0A" stroke-width="4"/>
    <text x="790" y="493" font-size="17" font-weight="800" text-anchor="middle">점검표 = 평가 함수 · '완료' 텍스트를 믿지 않고 매번 소스에서 실측한다</text>
