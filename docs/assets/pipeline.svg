    <text x="555" y="278" font-size="13" font-weight="700" text-anchor="middle">check 술어 점검표</text>

    <path d="M 640 240 H 688" fill="none" stroke="#0A0A0A" stroke-width="4"/>
    <polygon points="700,240 688,234 688,246"/>

